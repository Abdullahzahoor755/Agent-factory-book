<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Signup | Agent Factory Book</title><link rel="stylesheet" href="css/style.css"></head>
<body data-page="signup">
  <main class="content" style="margin-left:0;width:100%;height:auto;overflow:visible;padding:40px 32px;">
    <section class="hero reveal"><p class="eyebrow">Access</p><h1>Signup</h1><p class="subtitle">Create your local account.</p></section>
    <section class="section reveal"><div class="content-card stack">
      <label>API Base <input id="authApiBase" value="http://127.0.0.1:8000"></label>
      <form id="signupForm" class="stack">
        <input name="full_name" type="text" placeholder="Full name">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>
        <button class="button button--primary" type="submit">Create account</button>
      </form>
      <p id="authMessage" class="muted"></p>
      <a class="text-link" href="login.html">Already have an account? Login</a>
    </div></section>
  </main>
  <script src="js/script.js"></script>
</body></html>
