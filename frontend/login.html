<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Agent Factory Book</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
  <main class="content" style="margin-left:0;width:100%;height:auto;overflow:visible;padding:40px 32px;">
    <section class="hero reveal">
      <p class="eyebrow">Access</p>
      <h1>Login</h1>
      <p class="subtitle">Enter your account to manage connected APIs and agent tools.</p>
    </section>
    <section class="section reveal">
      <div class="content-card stack">
        <label>Email <input id="authApiBase" value="http://127.0.0.1:8000"></label>
        <form id="loginForm" class="stack">
          <input name="email" type="email" placeholder="Email" required>
          <input name="password" type="password" placeholder="Password" required>
          <button class="button button--primary" type="submit">Login</button>
        </form>
        <p id="authMessage" class="muted"></p>
        <a class="text-link" href="signup.html">Need an account? Sign up</a>
      </div>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
